<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Countdown zur Fuellmich-Freilassung</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script defer src="../js/countdown.js"></script>
</head>

<body class="countdown-page">
  <header class="site-header">
    <a class="back-link" href="../index.html">← Übersicht</a>
  </header>

  <main class="countdown-main">
    <p class="label">Noch</p>

    <h1 class="countdown-title"><span id="days">–</span> Tage</h1>

    <div class="subtime" aria-label="Zusätzlicher Countdown">
      <span><strong id="hours">–</strong>Stunden</span>
      <span><strong id="minutes">–</strong>Minuten</span>
      <span><strong id="seconds">–</strong>Sekunden</span>
    </div>

    <p class="label">bis zur Fuellmich-Freilassung</p>

    <img class="portrait" src="../img/fuellmich-schmollt.png" alt="Porträt">

    <p class="date">12. September 2026</p>
  <p class="source">Quelle: bittel.tv</p>
  </main>
</body>
</html>
